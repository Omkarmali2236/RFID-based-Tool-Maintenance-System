<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Maintenance System</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    
    <!-- Industrial Theme Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght=500;600;700&display=swap" rel="stylesheet">
    
    <!-- Industrial Theme CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/industrial-theme.css') }}">
</head>
<body>
    <header>
        <div class="header-bar d-flex align-items-center justify-content-between px-3 shadow-sm">
            <div class="d-flex align-items-center gap-2">
                <div class="logo-box">
                    <img src="{{ url_for('static', filename='assets/tata_logo.png') }}" alt="Tata Motors Logo" class="tata-logo">
                </div>
                <div class="header-text">
                    <h1 class="main-headline mb-0">TOOL MAINTENANCE SYSTEM</h1>
                </div>
            </div>
        </div>
            </div>
        </div>
        <div class="nav-bg" style="background: #1e293b; position: relative; min-height: 48px;">
            <nav class="navbar navbar-expand-lg" style="position:relative;z-index:2;">
                <div class="container-fluid justify-content-center">
                    <ul class="navbar-nav flex-row gap-3">
                        <li class="nav-item">
                            <a href="/register" class="nav-link px-3 py-2 rounded text-white{% if request.path == '/register' %} active bg-primary{% endif %}">Register Tool</a>
                        </li>
                        <li class="nav-item">
                            <a href="/scan" class="nav-link px-3 py-2 rounded text-white{% if request.path == '/scan' %} active bg-primary{% endif %}">Scan for Maintenance</a>
                        </li>
                        <li class="nav-item">
                            <a href="/receive" class="nav-link px-3 py-2 rounded text-white{% if request.path == '/receive' %} active bg-primary{% endif %}">Maintenance Completed</a>
                        </li>
                        <li class="nav-item">
                            <a href="/history" class="nav-link px-3 py-2 rounded text-white{% if request.path.startswith('/history') %} active bg-primary{% endif %}">Maintenance History</a>
                        </li>
                        <li class="nav-item">
                            <a href="/registered_tools" class="nav-link px-3 py-2 rounded text-white{% if request.path == '/registered_tools' %} active bg-primary{% endif %}">Registered Tools</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <div class="container py-4">
            {% block content %}{% endblock %}
        </div>
        <!-- Toast container for notifications -->
        <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
            <div id="main-toast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body" id="main-toast-body"></div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
        </div>
    </main>
    <!-- Bootstrap 5 JS (required for modals, toasts, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    
    <script>
        // Bootstrap Toast helper - Universal function for all pages
        function showToast(message, type = 'primary') {
            const toastEl = document.getElementById('main-toast');
            const toastBody = document.getElementById('main-toast-body');
            toastBody.textContent = message;
            toastEl.className = `toast align-items-center text-bg-${type} border-0`;
            const toast = new bootstrap.Toast(toastEl, { delay: 3500 });
            toast.show();
        }

        // Handle delete operations with auto-refresh
        async function deleteWithRefresh(url) {
            if (confirm('Are you sure you want to delete this record?')) {
                try {
                    const response = await fetch(url, { method: 'DELETE' });
                    if (response.ok) {
                        // Clear all filter inputs
                        const filterInputs = document.querySelectorAll('input[data-filter], select[data-filter]');
                        filterInputs.forEach(input => {
                            input.value = '';
                        });
                        // Clear filter button state if exists
                        const filterBtn = document.getElementById('clear-filters-btn');
                        if (filterBtn) {
                            filterBtn.click();
                        }
                        // Reload page
                        location.reload();
                    } else {
                        alert('Error deleting record');
                    }
                } catch (error) {
                    console.error('Delete error:', error);
                    alert('Error deleting record');
                }
            }
        }
    </script>
</body>
</html>
