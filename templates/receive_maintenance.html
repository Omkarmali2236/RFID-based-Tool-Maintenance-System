{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="h4 mb-4 fw-bold"><i class="bi bi-check-circle"></i> Maintenance Completed</h2>
                {% if message %}
                    <div class="alert alert-info" role="alert">{{ message }}</div>
                {% endif %}
                <form method="post" autocomplete="off">
                    <div class="mb-3">
                        <label for="rfid_uid" class="form-label"><i class="bi bi-qr-code"></i> RFID UID <span class="text-danger">*</span></label>
                        <input type="text" id="rfid_uid" name="rfid_uid" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check"></i> Mark as Completed</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
